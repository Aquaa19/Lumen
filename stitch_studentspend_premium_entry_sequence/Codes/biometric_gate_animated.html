<style>
        body {
            background-color: #0F172A; /* Overriding for specific prompt requirement */
        }
        
        .pulse-glow {
            animation: pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse-glow {
            0%, 100% {
                filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.3)) drop-shadow(0 0 30px rgba(59, 130, 246, 0.2));
                opacity: 1;
            }
            50% {
                filter: drop-shadow(0 0 25px rgba(59, 130, 246, 0.5)) drop-shadow(0 0 50px rgba(59, 130, 246, 0.3));
                opacity: 0.8;
            }
        }

        .ambient-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }
    </style>

<body class="text-on-surface min-h-screen flex flex-col items-center justify-between p-container-padding relative overflow-hidden font-body-lg">
<!-- Ambient Lighting Orbs -->
<div class="ambient-blob w-[40vw] h-[40vw] bg-primary top-[10%] left-[-10%]"></div>
<div class="ambient-blob w-[60vw] h-[60vw] bg-secondary-fixed right-[-20%] bottom-[-10%] opacity-10"></div>
<!-- Top AppBar (Simplified for Gate Screen) -->
<header class="w-full flex items-center justify-between z-10 pt-safe">
<h1 class="font-display-lg text-display-lg tracking-tighter text-primary">FINTECH</h1>
<div class="w-10 h-10 rounded-full flex items-center justify-center bg-surface-container/20 backdrop-blur-md border border-white/5">
<span class="material-symbols-outlined text-primary" data-icon="shield">shield</span>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center w-full z-10 space-y-xl">
<!-- Glassmorphic Icon Container -->
<div class="relative w-40 h-40 flex items-center justify-center rounded-[2rem] bg-surface-container/10 backdrop-blur-[20px] border border-white/5 shadow-[0_8px_32px_rgba(59,130,246,0.15)] group transition-all duration-500 ease-in-out hover:bg-surface-container/20">
<!-- Inner Glow -->
<div class="absolute inset-0 rounded-[2rem] bg-gradient-to-br from-white/10 to-transparent pointer-events-none"></div>
<!-- STITCH_SVG_START:ANIMATION_8 class="w-32 h-32" --><div class="w-32 h-32" id="animated-svg-ANIMATION_8" style="display:block;"><svg height="120" viewbox="0 0 120 120" width="120" xmlns="http://www.w3.org/2000/svg">
<defs>
<filter height="200%" id="glass-glow" width="200%" x="-50%" y="-50%">
<fegaussianblur result="blur" stddeviation="5"></fegaussianblur>
<femerge>
<femergenode in="blur"></femergenode>
<femergenode in="SourceGraphic"></femergenode>
</femerge>
</filter>
<style>
      @keyframes pulse {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }
      .pulse-ring {
        animation: pulse 3s ease-in-out infinite;
        transform-origin: center;
      }
      .fingerprint-path {
        stroke-dasharray: 200;
        stroke-dashoffset: 200;
        animation: draw 2s ease-out forwards;
      }
      @keyframes draw {
        to { stroke-dashoffset: 0; }
      }
    </style>
</defs>
<rect fill="rgba(255, 255, 255, 0.1)" height="100" rx="24" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1.5" style="backdrop-filter: blur(10px);" width="100" x="10" y="10"></rect>
<g class="pulse-ring">
<path class="fingerprint-path" d="M45 40 C45 35 55 30 60 30 C65 30 75 35 75 40 M35 50 C35 40 50 35 60 35 C70 35 85 40 85 50 M30 65 C30 50 50 45 60 45 C70 45 90 50 90 65 M35 80 C35 70 50 65 60 65 C70 65 85 70 85 80 M45 90 C45 85 55 80 60 80 C65 80 75 85 75 90" fill="none" filter="url(#glass-glow)" stroke="#3B82F6" stroke-linecap="round" stroke-width="3"></path>
<circle cx="60" cy="60" fill="#3B82F6" filter="url(#glass-glow)" opacity="0.3" r="10"></circle>
</g>
</svg></div><!-- STITCH_SVG_END:ANIMATION_8 -->
</div>
<div class="text-center space-y-sm">
<h2 class="font-title-md text-title-md text-on-surface">Identity Verified Required</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Please authenticate to continue</p>
</div>
</main>
<!-- Bottom Actions -->
<footer class="w-full pb-8 z-10 flex justify-center">
<button class="px-lg py-sm rounded-full border border-primary/30 text-primary font-label-caps text-label-caps hover:bg-primary/10 transition-colors duration-300 backdrop-blur-md">
            Use Pin
        </button>
</footer>
