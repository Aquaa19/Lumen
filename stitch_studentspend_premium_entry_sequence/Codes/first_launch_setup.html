<script>
        // Simple script to format the input as currency while typing
        const input = document.querySelector('input');
        input.addEventListener('input', function(e) {
            // Remove non-numeric characters except decimal point
            let val = this.value.replace(/[^0-9.]/g, '');
            
            // Ensure only one decimal point
            const parts = val.split('.');
            if (parts.length > 2) {
                val = parts[0] + '.' + parts.slice(1).join('');
            }
            
            // Limit decimal places to 2
            if (val.includes('.')) {
                const dec = val.split('.')[1];
                if (dec.length > 2) {
                    val = val.substring(0, val.length - (dec.length - 2));
                }
            }

            // Format with dollar sign and commas
            if (val) {
                if (val === '.') {
                    this.value = '$0.';
                } else {
                    const numberParts = val.split('.');
                    numberParts[0] = numberParts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
                    this.value = '$' + numberParts.join('.');
                }
            } else {
                this.value = '';
            }
        });
    </script>
