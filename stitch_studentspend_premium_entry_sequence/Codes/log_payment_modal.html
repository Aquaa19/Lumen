<script>
        // Simple Interaction Logic
        document.addEventListener('DOMContentLoaded', () => {
            const btnCash = document.getElementById('btnCash');
            const btnUpi = document.getElementById('btnUpi');
            
            btnCash.addEventListener('click', () => {
                btnCash.classList.add('glass-active', 'text-on-surface');
                btnCash.classList.remove('text-on-surface-variant');
                btnUpi.classList.remove('glass-active', 'text-on-surface');
                btnUpi.classList.add('text-on-surface-variant');
            });

            btnUpi.addEventListener('click', () => {
                btnUpi.classList.add('glass-active', 'text-on-surface');
                btnUpi.classList.remove('text-on-surface-variant');
                btnCash.classList.remove('glass-active', 'text-on-surface');
                btnCash.classList.add('text-on-surface-variant');
            });

            // Numpad logic (visual only for mockup)
            const numpadBtns = document.querySelectorAll('.numpad-btn');
            const display = document.getElementById('amountDisplay');
            let currentVal = '0';

            numpadBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const val = e.target.innerText.trim();
                    if(val === 'backspace' || e.target.closest('span')) {
                        currentVal = currentVal.length > 1 ? currentVal.slice(0, -1) : '0';
                    } else if (val && val.length === 1) {
                        if(currentVal === '0' && val !== '.') {
                            currentVal = val;
                        } else {
                            if(currentVal.length < 8) currentVal += val;
                        }
                    }
                    display.innerText = `₹${currentVal}`;
                });
            });
        });
    </script>
