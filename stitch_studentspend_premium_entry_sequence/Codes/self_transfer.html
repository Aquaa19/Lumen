<style>
        /* Base typography defaults from design system */
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #32353c; /* surface-variant */
            border-radius: 4px;
        }

        /* Glassmorphism utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* Ambient glow animation */
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }
        .ambient-glow {
            animation: pulse-glow 8s ease-in-out infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="bg-background text-on-surface min-h-screen relative overflow-x-hidden flex flex-col items-center">
<!-- Ambient Background Effects -->
<div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
<!-- Top right primary glow -->
<div class="absolute -top-32 -right-32 w-96 h-96 bg-primary-container/20 rounded-full blur-[100px] ambient-glow"></div>
<!-- Bottom left tertiary glow -->
<div class="absolute -bottom-32 -left-32 w-96 h-96 bg-tertiary-container/10 rounded-full blur-[100px] ambient-glow" style="animation-delay: -4s;"></div>
</div>
<!-- Mobile Container (Max Width 480px typical for fintech mobile views) -->
<div class="w-full max-w-[480px] min-h-screen flex flex-col relative z-10">
<!-- Minimal Header (Back-to-Main Exception) -->
<header class="flex items-center justify-between p-container-padding pb-md">
<button class="flex items-center justify-center w-10 h-10 rounded-full bg-surface-container hover:bg-surface-container-high transition-colors text-on-surface">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-title-md text-white tracking-[-0.015em]">Self Transfer</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col px-container-padding gap-md pb-xl">
<!-- Cards Section Container -->
<div class="relative flex flex-col mt-sm">
<!-- Card 1: From (Cash Wallet) -->
<div class="glass-panel rounded-xl p-md relative overflow-hidden group cursor-pointer transition-all hover:bg-white/[0.05]">
<!-- Amber inner glow accent -->
<div class="absolute -top-10 -right-10 w-32 h-32 bg-tertiary/20 blur-[40px] rounded-full pointer-events-none"></div>
<div class="flex items-start justify-between relative z-10">
<div class="flex items-center gap-md">
<!-- Icon Container -->
<div class="w-12 h-12 rounded-lg bg-tertiary/10 border border-tertiary/20 flex items-center justify-center text-tertiary shrink-0">
<span class="material-symbols-outlined text-[24px]">payments</span>
</div>
<!-- Wallet Details -->
<div class="flex flex-col gap-xs">
<span class="font-label-caps text-on-surface-variant uppercase tracking-widest text-[10px]">From</span>
<h3 class="font-title-md text-white leading-tight">Cash Wallet</h3>
<p class="font-body-sm text-on-surface-variant mt-1">Balance: <span class="text-white">$500.00</span></p>
</div>
</div>
</div>
</div>
<!-- Center: Sleek Glowing Arrow -->
<div class="relative z-20 flex justify-center -my-4">
<div class="w-10 h-10 rounded-full bg-surface-container-highest border border-outline-variant/30 flex items-center justify-center shadow-[0_0_20px_rgba(173,198,255,0.15)] relative">
<!-- Subtle outer ring glow -->
<div class="absolute inset-0 rounded-full bg-primary/10 blur-sm pointer-events-none"></div>
<span class="material-symbols-outlined text-primary text-[20px] relative z-10">arrow_downward</span>
</div>
</div>
<!-- Card 2: To (UPI Wallet) -->
<div class="glass-panel rounded-xl p-md relative overflow-hidden group cursor-pointer transition-all hover:bg-white/[0.05]">
<!-- Electric Blue inner glow accent -->
<div class="absolute -bottom-10 -right-10 w-32 h-32 bg-primary/20 blur-[40px] rounded-full pointer-events-none"></div>
<div class="flex items-start justify-between relative z-10">
<div class="flex items-center gap-md">
<!-- Icon Container -->
<div class="w-12 h-12 rounded-lg bg-primary/10 border border-primary/20 flex items-center justify-center text-primary shrink-0">
<span class="material-symbols-outlined text-[24px]">qr_code_scanner</span>
</div>
<!-- Wallet Details -->
<div class="flex flex-col gap-xs">
<span class="font-label-caps text-on-surface-variant uppercase tracking-widest text-[10px]">To</span>
<h3 class="font-title-md text-white leading-tight">UPI Wallet</h3>
<p class="font-body-sm text-on-surface-variant mt-1">Balance: <span class="text-white">$120.00</span></p>
</div>
</div>
</div>
</div>
</div>
<!-- Amount Input Section -->
<div class="mt-lg flex flex-col items-center justify-center flex-1">
<label class="font-label-caps text-on-surface-variant mb-md tracking-widest" for="transfer-amount">Amount to transfer</label>
<div class="relative w-full max-w-[280px] flex items-center justify-center group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 font-headline-lg text-on-surface-variant pointer-events-none transition-colors group-focus-within:text-primary">$</span>
<input class="w-full bg-transparent border-0 border-b-2 border-outline-variant/50 text-center font-display-lg text-white focus:ring-0 focus:border-primary transition-all pb-2 pl-12 pr-4 placeholder:text-on-surface-variant/30 [appearance:textfield] [&amp;::-webkit-outer-spin-button]:appearance-none [&amp;::-webkit-inner-spin-button]:appearance-none" id="transfer-amount" placeholder="0.00" type="number"/>
<!-- Neon blue glow effect on focus line -->
<div class="absolute bottom-0 left-0 right-0 h-[2px] bg-primary scale-x-0 opacity-0 group-focus-within:scale-x-100 group-focus-within:opacity-100 transition-all duration-300 shadow-[0_0_12px_rgba(173,198,255,0.6)]"></div>
</div>
</div>
<!-- Bottom Action Area -->
<div class="mt-auto pt-xl w-full">
<button class="w-full relative overflow-hidden rounded-xl bg-[#3B82F6] text-white font-title-md py-4 transition-transform active:scale-[0.98] flex items-center justify-center gap-sm shadow-[0_0_24px_rgba(59,130,246,0.3)] group">
<!-- Intense hover glow behind text -->
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700 ease-in-out"></div>
<span class="relative z-10">Confirm Transfer</span>
<span class="material-symbols-outlined text-[20px] relative z-10" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
</div>
</main>
</div>
<!-- Optional: Micro-interaction script for input styling -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const amountInput = document.getElementById('transfer-amount');
            
            // Auto-resize or format could go here, keeping it minimal for UI focus
            amountInput.addEventListener('input', (e) => {
                // Ensure only positive numbers
                if(e.target.value < 0) e.target.value = 0;
            });
        });
    </script>
</body></html>
